<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свидание 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card" id="app">
    <h1>💕 Привет, красотка!</h1>
    <p class="sub">Хочешь пойти со мной на свидание?</p>

    <div class="meme-box" id="memeContainer">
        <img id="memeImage" src="image-1.jpg" alt="мем">
    </div>

    <div id="questionBlock">
        <div class="btn-group">
            <button class="btn btn-yes" id="yesBtn">ДА ❤️</button>
            <button class="btn btn-no" id="noBtn">НЕТ 😤</button>
        </div>
    </div>

    <div id="finalBlock" class="hidden">
        <div class="final-message">🎉 Ты согласилась! 🎉</div>
        
        <!-- ГИФКА image-7.gif -->
        <div class="meme-box">
            <img src="image-7.gif" alt="радость">
        </div>
        
        <div class="address">
            📍 Встречаемся в <span>Almaty Museum of Arts</span><br>
            <strong>проспект Аль-Фараби, 28</strong>
        </div>

        <!-- КАРТА image-8 -->
        <div class="map-box">
            <img src="image-8.jpg" alt="Карта с местоположением музея">
        </div>
        
        <div class="time">
            🗓️ <strong>15 июля 2026 года в 15:00</strong>
        </div>
        
        <p style="font-size: 1rem; color: #555; margin-top: 15px;">
        </p>
    </div>
</div>

<script>
    (function() {
        const memes = [
            "image-1.jpg",
            "image-2.jpg",
            "image-3.gif",
            "image-4.jpg",
            "image-5.jpg",
            "image-6.gif"
        ];

        const noTexts = [
            "НЕТ 😤",
            "Точно нет? 🤨",
            "Точно-точно нет? 😏",
            "А может да? 😈",
            "ПОСЛЕДНИЙ РАЗ СПРАШИВАЮ! 😡",
            "ТЫ НЕ СМОЖЕШЬ НАЖАТЬ 'НЕТ' БОЛЬШЕ 😂"
        ];

        let attempts = 0;
        const maxAttempts = 6;

        const memeImg = document.getElementById('memeImage');
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionBlock = document.getElementById('questionBlock');
        const finalBlock = document.getElementById('finalBlock');

        function updateUI() {
            let memeIndex = attempts;
            if (memeIndex >= memes.length) memeIndex = memes.length - 1;
            
            memeImg.src = memes[memeIndex];

            let textIndex = attempts;
            if (textIndex >= noTexts.length) textIndex = noTexts.length - 1;
            noBtn.textContent = noTexts[textIndex];

            if (attempts >= 5) {
                noBtn.disabled = true;
            } else {
                noBtn.disabled = false;
            }
        }

        noBtn.addEventListener('click', function() {
            attempts++;
            updateUI();

            if (attempts >= maxAttempts) {
                showFinal();
            }
        });

        yesBtn.addEventListener('click', function() {
            showFinal();
        });

        function showFinal() {
            questionBlock.classList.add('hidden');
            finalBlock.classList.remove('hidden');
            document.getElementById('memeContainer').style.display = 'none';
            document.querySelector('.btn-group').style.display = 'none';
        }

        updateUI();
    })();
</script>
</body>
</html>
